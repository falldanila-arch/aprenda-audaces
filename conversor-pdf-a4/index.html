  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #009C3B;
      --green-light: #00c94b;
      --yellow: #FFDF00;
      --bg: #0a1628;
      --bg-darker: #050e1a;
      --bg-card: #0d1f3c;

      --text-muted: #7a90b8;

    body {

      line-height: 1.6;
    }
    
    .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
    
    #navbar {

    .hero-content h1 { font-family: 'Bebas Neue'; font-size: clamp(2.5rem, 8vw, 4rem); letter-spacing: 2px; margin-bottom: 16px; color: #fff; }
    .hero-content h1 span { color: var(--yellow); }
    .hero-content p { font-size: 18px; color: var(--text-muted); margin-bottom: 40px; max-width: 600px; margin-left: auto; margin-right: auto; }
    
    #pricing-section { padding: 60px 0; background: rgba(0, 0, 0, 0.3); }
    .pricing-card { background: var(--bg-card); border: 2px solid rgba(255, 223, 0, 0.3); border-radius: 16px; padding: 32px; text-align: center; margin-bottom: 24px; }
    .pricing-value { font-family: 'Bebas Neue'; font-size: 3.5rem; color: var(--yellow); margin: 16px 0; }
    .pricing-desc { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
    
    #upload-section { padding: 60px 0; }

    .file-input-label {

    .file-input-label:hover { background: rgba(0, 156, 59, 0.25); border-color: rgba(0, 156, 59, 0.6); }
    #pdfInput { display: none; }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 32px;
      font-family: 'Barlow', sans-serif;
      font-weight: 700;
      font-size: 15px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: all 0.25s ease;
    }
    
    .btn-primary {
      background: var(--green);
      color: #fff;
      border: 2px solid var(--green-light);
      box-shadow: 0 0 20px rgba(0, 156, 59, 0.3);
      width: 100%;
      margin-top: 20px;
    }
    
    .btn-primary:hover:not(:disabled) { box-shadow: 0 0 30px rgba(0, 156, 59, 0.45); transform: translateY(-2px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .btn-payment {
      background: var(--yellow);
      color: var(--bg-darker);
      border: 2px solid var(--yellow);
      font-weight: 800;
      width: 100%;
      margin-top: 20px;
    }
    
    .btn-payment:hover:not(:disabled) { background: #e6c800; transform: translateY(-2px); }
    
    .voucher-input {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #fff;
      font-family: 'Barlow';
      margin-bottom: 12px;
    }
    
    .voucher-input:focus { outline: none; border-color: var(--yellow); box-shadow: 0 0 10px rgba(255, 223, 0, 0.2); }
    
    .progress-wrapper { margin-top: 24px; display: none; }
    .progress-bar { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.1); border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { height: 100%; background: var(--green); width: 0%; transition: width 0.3s ease; }
    .progress-text { font-size: 13px; color: var(--text-muted); text-align: center; }
    
    #preview-section { padding: 60px 0; display: none; }
    .preview-title { font-family: 'Bebas Neue'; font-size: 2rem; letter-spacing: 1px; margin-bottom: 32px; text-align: center; color: #fff; }
    .preview-title span { color: var(--yellow); }
    
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .preview-page { background: white; border: 2px solid rgba(0, 156, 59, 0.3); border-radius: 8px; overflow: auto; position: relative; max-height: 280px; padding: 8px; }
    .preview-page canvas { width: 100%; height: auto; background: white; }
    .preview-overlay { position: absolute; top: 8px; right: 8px; background: var(--green); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
    
    .assembly-guide { background: rgba(0, 156, 59, 0.1); border: 1px solid rgba(0, 156, 59, 0.3); border-radius: 12px; padding: 24px; margin: 32px 0; }
    .assembly-guide h3 { color: var(--green-light); margin-bottom: 16px; font-size: 1.2rem; }
    .assembly-guide ol { margin-left: 24px; color: var(--text-muted); }
    .assembly-guide li { margin-bottom: 10px; }
    .assembly-diagram { background: rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 16px; margin-top: 16px; text-align: center; font-family: monospace; font-size: 12px; overflow-x: auto; }
    
    .message { padding: 16px 20px; margin-bottom: 24px; border-radius: 8px; font-weight: 600; animation: slideIn 0.3s ease; }
    .success-message { display: none; background: rgba(0, 156, 59, 0.2); border: 1px solid rgba(0, 156, 59, 0.4); color: var(--green-light); }
    .error-message { display: none; background: rgba(231, 76, 60, 0.2); border: 1px solid rgba(231, 76, 60, 0.4); color: #ff6b5b; }
    .message.show { display: block; }
    
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    
    .modal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); z-index: 200; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: var(--bg-card); border: 1px solid rgba(255, 223, 0, 0.3); border-radius: 16px; padding: 32px; max-width: 500px; width: 90%; }
    .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
    .modal h2 { font-family: 'Bebas Neue'; font-size: 1.8rem; margin-bottom: 16px; }
    .modal p { color: var(--text-muted); margin-bottom: 16px; }
    
    #stripe-element { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 12px; margin-bottom: 16px; }
    
    footer { background: var(--bg-darker); border-top: 1px solid rgba(255, 255, 255, 0.05); padding: 48px 0 32px; text-align: center; color: var(--text-muted); font-size: 13px; }
    footer p { margin-bottom: 12px; }

    .admin-link:hover { background: var(--green-light); transform: scale(1.1); }
